<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Arisha 🎉</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body { overflow: hidden; }

    .balloon {
      position: absolute;
      bottom: -150px;
      width: 60px;
      height: 80px;
      border-radius: 50%;
      animation: float 10s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-120vh); }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background: white;
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body class="bg-gradient-to-r from-pink-400 via-purple-500 to-indigo-500 flex items-center justify-center h-screen text-white">

  <!-- 🎵 Music -->
  <audio id="music" preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6c1d8f0.mp3?filename=happy-birthday-to-you-piano-version-113456.mp3" type="audio/mp3">
  </audio>

  <!-- 🎈 Balloons -->
  <div class="balloon bg-red-400 left-[10%]"></div>
  <div class="balloon bg-yellow-400 left-[30%]"></div>
  <div class="balloon bg-green-400 left-[50%]"></div>
  <div class="balloon bg-blue-400 left-[70%]"></div>
  <div class="balloon bg-pink-400 left-[90%]"></div>

  <!-- 🎂 Content -->
  <div class="text-center z-10">
    <h1 class="text-5xl font-bold mb-4 animate-bounce">🎉 Happy Birthday 🎉</h1>

    <h2 class="text-4xl font-bold mb-4">
      <span id="typing"></span><span class="cursor"></span>
    </h2>

    <p class="text-xl mb-6">God bless you with happiness 💖</p>

    <button onclick="startCelebration()" 
      class="bg-white text-purple-600 px-6 py-3 rounded-full font-bold">
      🎊 Click to Start 🎊
    </button>
  </div>

  <script>
    // Typing
    const text = "Arisha 💖";
    let i = 0;
    function type() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text[i];
        i++;
        setTimeout(type, 120);
      }
    }
    type();

    // 🎵 Music Play FIX
    function playMusic() {
      const music = document.getElementById("music");
      music.volume = 1;

      music.play()
        .then(() => console.log("Music started"))
        .catch(err => {
          console.log("Error:", err);
          alert("Click again to enable sound 🔊");
        });
    }

    // 🎊 Confetti
    function confettiBurst() {
      confetti({ particleCount: 120, spread: 90 });
    }

    // 🎆 Fireworks
    function fireworks() {
      let end = Date.now() + 4000;
      (function frame() {
        confetti({
          particleCount: 5,
          angle: Math.random() * 360,
          spread: 100,
          origin: { x: Math.random(), y: Math.random() }
        });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }

    function startCelebration() {
      playMusic();   // 🔥 important
      confettiBurst();
      fireworks();
    }
  </script>

</body>
</html>
